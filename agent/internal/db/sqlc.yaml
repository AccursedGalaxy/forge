version: "2"
sql:
  - engine: "postgresql"
    queries: "queries"
    schema: "migrations"
    gen:
      go:
        package: "db"
        out: "."
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "vector"
            go_type: "github.com/pgvector/pgvector-go.Vector"
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "pg_catalog.uuid"
            go_type: "github.com/google/uuid.UUID"
